<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Study Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <i class="fa-solid fa-stopwatch"></i>
            <a href="index.html" style="color: inherit; text-decoration: none;"><span>SmartTimer</span></a>
        </div>
        <div class="nav-links">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <a href="register.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container glass-card">
            <h2 class="text-center mb-2">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="john@example.com" required>
                    <div class="error-msg" id="loginEmailError">User not found, please register.</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter password" required>
                    <div class="error-msg" id="loginPasswordError">Incorrect password.</div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p class="text-center mt-1" style="font-size: 0.9rem;">
                Don't have an account? <a href="register.html">Sign up here</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
